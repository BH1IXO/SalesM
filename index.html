          if (filterPriority !== 'all' && c.priority !== filterPriority) return false;
          if (searchTerm && !c.name.toLowerCase().includes(searchTerm.toLowerCase()) && !c.contact.toLowerCase().includes(searchTerm.toLowerCase())) return false;
          return true;
        });
      }, [customers, filterAssignee, filterPriority, searchTerm]);

      const exportData = () => {
        const data = { customers, activities, expenses, competitors, customerCompetitors, exportDate: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `salesm-backup-${new Date().toISOString().split('T')[0]}.json`; a.click();
        URL.revokeObjectURL(url);
      };

      const importData = (jsonStr) => {
        try {
          const data = JSON.parse(jsonStr);
          if (data.customers) setCustomers(data.customers);
          if (data.activities) setActivities(data.activities);
          if (data.expenses) setExpenses(data.expenses);
          if (data.competitors) setCompetitors(data.competitors);
          if (data.customerCompetitors) setCustomerCompetitors(data.customerCompetitors);
          return true;
        } catch { return false; }
      };

      const exportCSV = () => {
        const headers = ['客户名称','行业','规模','联系人','电话','邮箱','状态','预计金额','预计成交日期','优先级','负责人','预算','已投入成本','ROI'];
        const rows = customers.map(c => {
          const stageName = PIPELINE_STAGES.find(s=>s.id===c.status)?.name || c.status;
          const assignee = TEAM_MEMBERS.find(m=>m.id===c.assignedTo)?.name || '';
          const totalExp = getCustomerTotalExpense(c.id);
          const roi = totalExp > 0 ? (c.amount / totalExp).toFixed(2) : 'N/A';
          return [c.name,c.industry,c.size,c.contact,c.phone,c.email,stageName,c.amount,c.expectedCloseDate,c.priority==='high'?'高':c.priority==='medium'?'中':'低',assignee,c.budget,totalExp,roi];
        });
        const csv = '﻿' + [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `salesm-export-${new Date().toISOString().split('T')[0]}.csv`; a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <StoreContext.Provider value={{
          customers, filteredCustomers, activities, expenses, competitors, customerCompetitors, currentUser, darkMode, filterAssignee, filterPriority, searchTerm,
          setDarkMode, setFilterAssignee, setFilterPriority, setSearchTerm,
          addCustomer, updateCustomer, moveCustomer, addActivity, addExpense, addCompetitor, addCustomerCompetitor,
          getCustomerActivities, getCustomerExpenses, getCustomerCompetitors, getCustomerTotalExpense,
          exportData, importData, exportCSV,
        }}>
          {children}
        </StoreContext.Provider>
      );
    }

    const useStore = () => useContext(StoreContext);

    // ==================== 通用组件 ====================
    function Modal({ open, onClose, title, children, wide }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40" onClick={onClose}>
          <div className={`bg-white dark:bg-gray-800 rounded-xl shadow-2xl ${wide ? 'w-[720px]' : 'w-[520px]'} max-h-[85vh] overflow-hidden fade-in`} onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between px-6 py-4 border-b dark:border-gray-700">
              <h3 className="text-lg font-semibold">{title}</h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-xl leading-none">&times;</button>
            </div>
            <div className="px-6 py-4 overflow-y-auto max-h-[calc(85vh-70px)] scrollbar-thin">{children}</div>
          </div>
        </div>
      );
    }

    function Badge({ children, color = 'blue' }) {
      const colors = {
        red: 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300',
        orange: 'bg-orange-100 text-orange-700 dark:bg-orange-900/40 dark:text-orange-300',
        yellow: 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/40 dark:text-yellow-300',
        green: 'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-300',
        blue: 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300',
        gray: 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300',
        purple: 'bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-300',
      };
      return <span className={`inline-block px-2 py-0.5 rounded-full text-xs font-medium ${colors[color]}`}>{children}</span>;
    }

    function StatCard({ label, value, sub, icon, trend }) {
      return (
        <div className="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
          <div className="flex items-center justify-between mb-2">
            <span className="text-gray-500 dark:text-gray-400 text-sm">{label}</span>
            <span className="text-2xl">{icon}</span>
          </div>

    // ==================== 管道看板卡片 ====================
    function PipelineCard({ customer, onClick }) {
      const store = useStore();
      const assignee = TEAM_MEMBERS.find(m => m.id === customer.assignedTo);
      const daysSinceFollow = Math.floor((new Date() - new Date(customer.lastFollowUp || customer.updatedAt)) / 86400000);
      const isOverdue = daysSinceFollow > 7;
      const priorityColors = { high: 'border-l-red-500', medium: 'border-l-amber-400', low: 'border-l-blue-300' };

      const handleDragStart = (e) => {
        e.dataTransfer.setData('customerId', customer.id);
        e.target.classList.add('card-drag');
      };
      const handleDragEnd = (e) => { e.target.classList.remove('card-drag'); };

      return (
        <div
          draggable
          onDragStart={handleDragStart}
          onDragEnd={handleDragEnd}
          onClick={() => onClick(customer)}
          className={`bg-white dark:bg-gray-800 rounded-lg p-3 mb-2 shadow-sm border-l-4 ${priorityColors[customer.priority]} cursor-pointer hover:shadow-md transition-shadow ${isOverdue ? 'ring-2 ring-red-300 dark:ring-red-700' : ''}`}

          <div className="flex items-start justify-between mb-1.5">

    function PipelineColumn({ stage, customers, onCardClick }) {

      const totalAmount = customers.reduce((s, c) => s + c.amount, 0);

      const handleDragLeave = (e) => { e.currentTarget.classList.remove('drop-target'); };
      const handleDrop = (e) => {
        e.preventDefault();
        e.currentTarget.classList.remove('drop-target');
        const cid = e.dataTransfer.getData('customerId');
        if (cid) store.moveCustomer(cid, stage.id);

      return (
        <div
          className={`flex-shrink-0 w-[260px] ${stage.color} rounded-xl p-3 pipeline-col`}

    // ==================== 页面：统计报表 ====================
    function ReportsPage() {
      const store = useStore();
      const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#6366f1'];

      const pipelineData = PIPELINE_STAGES.map(s => ({
        name: s.name,
        count: store.customers.filter(c => c.status === s.id).length,
        amount: store.customers.filter(c => c.status === s.id).reduce((sum, c) => sum + c.amount, 0) / 10000,
      }));

      const salesPerformance = TEAM_MEMBERS.filter(m => m.role.includes('销售代表') || m.role.includes('销售经理')).map(m => {
        const myCustomers = store.customers.filter(c => c.assignedTo === m.id);
        return {
          name: m.name,
          total: myCustomers.length,
          won: myCustomers.filter(c => c.status === 'won').length,
          wonAmount: myCustomers.filter(c => c.status === 'won').reduce((s, c) => s + c.amount, 0) / 10000,
          pipeline: myCustomers.filter(c => !['won','lost'].includes(c.status)).reduce((s, c) => s + c.amount, 0) / 10000,
          activities: store.activities.filter(a => a.createdBy === m.id).length,
        };
      });

      const expenseByType = EXPENSE_TYPES.map(t => ({
        name: t.name,
        value: store.expenses.filter(e => e.type === t.id).reduce((s, e) => s + e.amount, 0),
      })).filter(e => e.value > 0);

      const activityByType = ACTIVITY_TYPES.map(t => ({
        name: t.name,
        count: store.activities.filter(a => a.type === t.id).length,
      }));

      const totalPipeline = store.customers.filter(c => !['won','lost'].includes(c.status)).reduce((s, c) => s + c.amount, 0);
      const totalWon = store.customers.filter(c => c.status === 'won').reduce((s, c) => s + c.amount, 0);
      const totalExpense = store.expenses.reduce((s, e) => s + e.amount, 0);
      const winRate = store.customers.filter(c => ['won','lost'].includes(c.status)).length > 0
        ? (store.customers.filter(c => c.status === 'won').length / store.customers.filter(c => ['won','lost'].includes(c.status)).length * 100).toFixed(0) : '—';

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-4 gap-4">
            <StatCard label="管道总金额" value={`¥${(totalPipeline/10000).toFixed(0)}万`} icon="💰" sub="活跃机会" />
            <StatCard label="已赢单金额" value={`¥${(totalWon/10000).toFixed(0)}万`} icon="🏆" sub={`${store.customers.filter(c=>c.status==='won').length}个客户`} trend="up" />
            <StatCard label="赢单率" value={`${winRate}%`} icon="📈" sub="已关闭机会" />
            <StatCard label="总投入成本" value={`¥${(totalExpense/10000).toFixed(1)}万`} icon="💸" sub={`ROI ${totalExpense>0?(totalWon/totalExpense).toFixed(1):'—'}x`} />
          </div>

          <div className="grid grid-cols-2 gap-6">
            <div className="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
              <h3 className="font-semibold mb-4">管道分布</h3>
              <ResponsiveContainer width="100%" height={280}>
                <BarChart data={pipelineData}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                  <XAxis dataKey="name" fontSize={11} />
                  <YAxis fontSize={11} />
                  <Tooltip formatter={(v, n) => n === 'amount' ? `${v.toFixed(0)}万` : v} />
                  <Legend />
                  <Bar dataKey="count" fill="#3b82f6" name="客户数" radius={[4,4,0,0]} />
                  <Bar dataKey="amount" fill="#10b981" name="金额(万)" radius={[4,4,0,0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>

            <div className="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
              <h3 className="font-semibold mb-4">费用分布</h3>
              <ResponsiveContainer width="100%" height={280}>
                <PieChart>
                  <Pie data={expenseByType} cx="50%" cy="50%" outerRadius={100} dataKey="value" label={({name, value}) => `${name} ¥${value.toLocaleString()}`} labelLine={true} fontSize={11}>
                    {expenseByType.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                  </Pie>
                  <Tooltip formatter={v => `¥${v.toLocaleString()}`} />
                </PieChart>
              </ResponsiveContainer>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-6">
            <div className="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
              <h3 className="font-semibold mb-4">销售业绩排行</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="text-left text-xs text-gray-500 border-b dark:border-gray-700">
                      <th className="py-2 px-2">销售</th>
                      <th className="py-2 px-2">客户数</th>
                      <th className="py-2 px-2">赢单</th>
                      <th className="py-2 px-2">赢单金额</th>
                      <th className="py-2 px-2">管道金额</th>
                      <th className="py-2 px-2">跟进次数</th>
                    </tr>
                  </thead>
                  <tbody>
                    {salesPerformance.sort((a,b) => b.wonAmount - a.wonAmount).map((s, i) => (
                      <tr key={i} className="border-b dark:border-gray-700/50 hover:bg-gray-50 dark:hover:bg-gray-700/30">
                        <td className="py-2.5 px-2 font-medium">{i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : ''} {s.name}</td>
                        <td className="py-2.5 px-2">{s.total}</td>
                        <td className="py-2.5 px-2">{s.won}</td>
                        <td className="py-2.5 px-2 text-green-600 dark:text-green-400 font-medium">¥{s.wonAmount.toFixed(0)}万</td>
                        <td className="py-2.5 px-2 text-blue-600 dark:text-blue-400">¥{s.pipeline.toFixed(0)}万</td>
                        <td className="py-2.5 px-2">{s.activities}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
              <h3 className="font-semibold mb-4">销售动作统计</h3>
              <ResponsiveContainer width="100%" height={280}>
                <BarChart data={activityByType} layout="vertical">
                  <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                  <XAxis type="number" fontSize={11} />
                  <YAxis type="category" dataKey="name" fontSize={11} width={70} />
                  <Tooltip />
                  <Bar dataKey="count" fill="#8b5cf6" name="次数" radius={[0,4,4,0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </div>
      );
    }

          <div className="flex justify-between items-center">
            <h2 className="text-xl font-bold">竞争对手分析</h2>
            <button onClick={() => setShowForm(true)} className="px-4 py-2 bg-primary-600 text-white rounded-lg text-sm hover:bg-primary-700">+ 添加竞品</button>
          </div>

          <div className="grid grid-cols-1 gap-4">
            {lostToCompetitor.map(c => (
              <div key={c.id} className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-100 dark:border-gray-700">
                <div className="flex items-start justify-between mb-4">
                  <div>
                    <h3 className="text-lg font-semibold">{c.name}</h3>
                    <div className="flex gap-3 mt-1">
                      <Badge color="blue">关联客户 {c.linkedCustomers}</Badge>
                      {c.lostCount > 0 && <Badge color="red">输单 {c.lostCount}</Badge>}
                    </div>
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-4 text-sm">
                  <div>
                    <div className="text-xs text-gray-500 dark:text-gray-400 mb-1 font-medium">优势</div>
                    <p className="text-green-700 dark:text-green-400 bg-green-50 dark:bg-green-900/20 rounded-lg p-3">{c.strengths}</p>
                  </div>
                  <div>
                    <div className="text-xs text-gray-500 dark:text-gray-400 mb-1 font-medium">劣势</div>
                    <p className="text-red-700 dark:text-red-400 bg-red-50 dark:bg-red-900/20 rounded-lg p-3">{c.weaknesses}</p>
                  </div>
                  <div>
                    <div className="text-xs text-gray-500 dark:text-gray-400 mb-1 font-medium">价格策略</div>
                    <p className="text-gray-600 dark:text-gray-300">{c.pricing}</p>
                  </div>
                  <div>
                    <div className="text-xs text-gray-500 dark:text-gray-400 mb-1 font-medium">典型客户</div>
                    <p className="text-gray-600 dark:text-gray-300">{c.typicalCustomers}</p>
                  </div>
                  {c.tactics && (
                    <div className="col-span-2">
                      <div className="text-xs text-gray-500 dark:text-gray-400 mb-1 font-medium">常用打法</div>
                      <p className="text-gray-600 dark:text-gray-300">{c.tactics}</p>
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>

          {store.customers.filter(c => c.status === 'lost').length > 0 && (
            <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-100 dark:border-gray-700">
              <h3 className="font-semibold mb-4">输单分析</h3>
              <div className="space-y-3">
                {store.customers.filter(c => c.status === 'lost').map(c => {
                  const comp = store.competitors.find(co => co.id === c.lossCompetitor);
                  return (
                    <div key={c.id} className="flex items-center gap-4 bg-red-50 dark:bg-red-900/20 rounded-lg p-3">
                      <div className="flex-1">
                        <span className="font-medium text-sm">{c.name}</span>
                        <span className="text-xs text-gray-500 ml-2">¥{(c.amount/10000).toFixed(0)}万</span>
                      </div>
                      <Badge color="red">{c.lossReason || '未记录'}</Badge>
                      {comp && <span className="text-xs text-gray-500">→ {comp.name}</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          <Modal open={showForm} onClose={() => setShowForm(false)} title="添加竞争对手" wide>
            <div className="space-y-4">
              <EditRow label="公司名称 *" value={form.name} onChange={v => setForm({...form, name:v})} />
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="text-xs text-gray-500 dark:text-gray-400">优势</label>
                  <textarea value={form.strengths} onChange={e => setForm({...form, strengths:e.target.value})} rows={3} className="w-full mt-1 px-3 py-2 border rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600" />
                </div>
                <div>
                  <label className="text-xs text-gray-500 dark:text-gray-400">劣势</label>
                  <textarea value={form.weaknesses} onChange={e => setForm({...form, weaknesses:e.target.value})} rows={3} className="w-full mt-1 px-3 py-2 border rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600" />
                </div>
              </div>
              <EditRow label="价格策略" value={form.pricing} onChange={v => setForm({...form, pricing:v})} />
              <EditRow label="典型客户" value={form.typicalCustomers} onChange={v => setForm({...form, typicalCustomers:v})} />
              <EditRow label="常用打法" value={form.tactics} onChange={v => setForm({...form, tactics:v})} />
              <div className="flex justify-end gap-2 mt-4">
                <button onClick={() => setShowForm(false)} className="px-4 py-2 bg-gray-100 dark:bg-gray-700 rounded-lg text-sm">取消</button>
                <button onClick={() => { if(form.name){ store.addCompetitor(form); setShowForm(false); setForm({name:'',strengths:'',weaknesses:'',pricing:'',typicalCustomers:'',tactics:''}); }}} disabled={!form.name} className="px-4 py-2 bg-primary-600 text-white rounded-lg text-sm hover:bg-primary-700 disabled:opacity-50">添加</button>
              </div>
            </div>
          </Modal>
        </div>
      );
    }

    // ==================== 页面：团队管理 ====================
    function TeamPage() {
      const store = useStore();

      const memberStats = TEAM_MEMBERS.map(m => {
        const myCustomers = store.customers.filter(c => c.assignedTo === m.id);
        const myActivities = store.activities.filter(a => a.createdBy === m.id);
        const myExpenses = store.expenses.filter(e => e.createdBy === m.id);
        return {
          ...m,
          customerCount: myCustomers.length,
          wonCount: myCustomers.filter(c => c.status === 'won').length,
          wonAmount: myCustomers.filter(c => c.status === 'won').reduce((s, c) => s + c.amount, 0),
          pipelineAmount: myCustomers.filter(c => !['won','lost'].includes(c.status)).reduce((s, c) => s + c.amount, 0),
          activityCount: myActivities.length,
          expenseTotal: myExpenses.reduce((s, e) => s + e.amount, 0),
          overdueCount: myCustomers.filter(c => {
            const days = Math.floor((new Date() - new Date(c.lastFollowUp || c.updatedAt)) / 86400000);
            return days > 7 && !['won','lost'].includes(c.status);
          }).length,
        };
      });

      return (
        <div className="space-y-6">
          <h2 className="text-xl font-bold">团队管理</h2>
          <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
            {memberStats.map(m => (
              <div key={m.id} className="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
                <div className="flex items-center gap-3 mb-4">
                  <span className="text-3xl">{m.avatar}</span>
                  <div>
                    <div className="font-semibold">{m.name}</div>
                    <div className="text-xs text-gray-500">{m.role}</div>
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-3 text-sm">
                  <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-2 text-center">
                    <div className="text-xs text-gray-500 dark:text-gray-400">客户数</div>
                    <div className="font-bold">{m.customerCount}</div>
                  </div>
                  <div className="bg-green-50 dark:bg-green-900/20 rounded-lg p-2 text-center">
                    <div className="text-xs text-gray-500 dark:text-gray-400">赢单</div>
                    <div className="font-bold text-green-600 dark:text-green-400">{m.wonCount}</div>
                  </div>
                  <div className="bg-blue-50 dark:bg-blue-900/20 rounded-lg p-2 text-center">
                    <div className="text-xs text-gray-500 dark:text-gray-400">管道金额</div>
                    <div className="font-bold text-blue-600 dark:text-blue-400">¥{(m.pipelineAmount/10000).toFixed(0)}万</div>
                  </div>
                  <div className="bg-purple-50 dark:bg-purple-900/20 rounded-lg p-2 text-center">
                    <div className="text-xs text-gray-500 dark:text-gray-400">跟进次数</div>
                    <div className="font-bold text-purple-600 dark:text-purple-400">{m.activityCount}</div>
                  </div>
                </div>
                {m.overdueCount > 0 && (
                  <div className="mt-3 text-xs text-red-500 flex items-center gap-1">
                    <span className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>
                    {m.overdueCount} 个客户超过7天未跟进
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ==================== 页面：客户列表 ====================
    function CustomersPage() {
      const store = useStore();
      const [selectedCustomer, setSelectedCustomer] = useState(null);
      const [sortBy, setSortBy] = useState('updatedAt');
      const [sortDir, setSortDir] = useState('desc');

      const sorted = useMemo(() => {
        return [...store.filteredCustomers].sort((a, b) => {
          const va = a[sortBy], vb = b[sortBy];
          if (typeof va === 'number') return sortDir === 'asc' ? va - vb : vb - va;
          return sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
        });
      }, [store.filteredCustomers, sortBy, sortDir]);

      const toggleSort = (field) => {
        if (sortBy === field) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        else { setSortBy(field); setSortDir('desc'); }
      };

      const SortHeader = ({ field, children }) => (
        <th onClick={() => toggleSort(field)} className="py-3 px-3 text-left cursor-pointer hover:text-primary-600 select-none">
          {children} {sortBy === field ? (sortDir === 'asc' ? '↑' : '↓') : ''}
        </th>
      );

      return (
        <div>
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-xl font-bold">客户列表</h2>
            <div className="flex gap-3">
              <input
                type="text"
                placeholder="搜索..."
                value={store.searchTerm}
                onChange={e => store.setSearchTerm(e.target.value)}
                className="px-4 py-2 border rounded-lg text-sm w-48 dark:bg-gray-800 dark:border-gray-600 focus:ring-2 focus:ring-primary-500 outline-none"
              />
            </div>
          </div>
          <div className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-gray-50 dark:bg-gray-700/50 text-xs text-gray-500 dark:text-gray-400 border-b dark:border-gray-700">
                  <tr>
                    <SortHeader field="name">客户名称</SortHeader>
                    <SortHeader field="industry">行业</SortHeader>
                    <SortHeader field="status">阶段</SortHeader>
                    <SortHeader field="amount">金额</SortHeader>
                    <SortHeader field="priority">优先级</SortHeader>
                    <th className="py-3 px-3 text-left">负责人</th>
                    <SortHeader field="expectedCloseDate">预计成交</SortHeader>
                    <SortHeader field="updatedAt">更新时间</SortHeader>
                  </tr>
                </thead>
                <tbody>
                  {sorted.map(c => {
                    const stage = PIPELINE_STAGES.find(s => s.id === c.status);
                    const assignee = TEAM_MEMBERS.find(m => m.id === c.assignedTo);
                    const daysSince = Math.floor((new Date() - new Date(c.lastFollowUp || c.updatedAt)) / 86400000);
                    return (
                      <tr key={c.id} onClick={() => setSelectedCustomer(c)} className="border-b dark:border-gray-700/50 hover:bg-gray-50 dark:hover:bg-gray-700/30 cursor-pointer transition-colors">
                        <td className="py-3 px-3 font-medium">{c.name}</td>
                        <td className="py-3 px-3 text-gray-500">{c.industry}</td>
                        <td className="py-3 px-3"><Badge color={c.status === 'won' ? 'green' : c.status === 'lost' ? 'red' : 'blue'}>{stage?.name}</Badge></td>
                        <td className="py-3 px-3 font-medium">¥{(c.amount/10000).toFixed(0)}万</td>
                        <td className="py-3 px-3"><Badge color={c.priority==='high'?'red':c.priority==='medium'?'orange':'gray'}>{c.priority==='high'?'高':c.priority==='medium'?'中':'低'}</Badge></td>
                        <td className="py-3 px-3">{assignee?.avatar} {assignee?.name}</td>
                        <td className="py-3 px-3 text-gray-500">{c.expectedCloseDate}</td>
                        <td className="py-3 px-3">
                          <span className={daysSince > 7 ? 'text-red-500 font-medium' : 'text-gray-500'}>{c.updatedAt}</span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
          {selectedCustomer && <CustomerSidebar customer={selectedCustomer} onClose={() => setSelectedCustomer(null)} />}
        </div>
      );
    }

    // ==================== 页面：设置 ====================
    function SettingsPage() {
      const store = useStore();
      const fileInputRef = useRef(null);
      const [importStatus, setImportStatus] = useState('');

      const handleImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const ok = store.importData(ev.target.result);
          setImportStatus(ok ? '数据导入成功！' : '导入失败，请检查文件格式');
          setTimeout(() => setImportStatus(''), 3000);
        };
        reader.readAsText(file);
      };

      return (
        <div className="max-w-2xl space-y-6">
          <h2 className="text-xl font-bold">设置</h2>

          <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-100 dark:border-gray-700">
            <h3 className="font-semibold mb-4">外观设置</h3>
            <div className="flex items-center justify-between">
              <div>
                <div className="font-medium text-sm">深色模式</div>
                <div className="text-xs text-gray-500 dark:text-gray-400">切换深色/浅色显示主题</div>
              </div>
              <button
                onClick={() => store.setDarkMode(!store.darkMode)}
                className={`relative w-12 h-6 rounded-full transition-colors ${store.darkMode ? 'bg-primary-600' : 'bg-gray-300'}`}
              >
                <span className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${store.darkMode ? 'translate-x-6' : 'translate-x-0.5'}`}></span>
              </button>
            </div>
          </div>

          <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-100 dark:border-gray-700">
            <h3 className="font-semibold mb-4">数据管理</h3>
            <div className="space-y-4">
              <div className="flex items-center justify-between">
                <div>
                  <div className="font-medium text-sm">导出 CSV</div>
                  <div className="text-xs text-gray-500 dark:text-gray-400">导出客户数据为 Excel 兼容格式</div>
                </div>
                <button onClick={store.exportCSV} className="px-4 py-2 bg-green-600 text-white rounded-lg text-sm hover:bg-green-700">导出 CSV</button>
              </div>
              <div className="flex items-center justify-between">
                <div>
                  <div className="font-medium text-sm">备份数据</div>
                  <div className="text-xs text-gray-500 dark:text-gray-400">导出所有数据为 JSON 备份文件</div>
                </div>
                <button onClick={store.exportData} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">导出备份</button>
              </div>
              <div className="flex items-center justify-between">
                <div>
                  <div className="font-medium text-sm">恢复数据</div>
                  <div className="text-xs text-gray-500 dark:text-gray-400">从 JSON 备份文件恢复数据</div>
                </div>
                <div>
                  <input type="file" ref={fileInputRef} accept=".json" onChange={handleImport} className="hidden" />
                  <button onClick={() => fileInputRef.current?.click()} className="px-4 py-2 bg-amber-600 text-white rounded-lg text-sm hover:bg-amber-700">导入备份</button>
                </div>
              </div>
              {importStatus && <div className={`text-sm ${importStatus.includes('成功') ? 'text-green-600' : 'text-red-600'}`}>{importStatus}</div>}
            </div>
          </div>

          <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-100 dark:border-gray-700">
            <h3 className="font-semibold mb-4">系统信息</h3>
            <div className="space-y-2 text-sm text-gray-600 dark:text-gray-400">
              <div>客户总数：{store.customers.length}</div>
              <div>跟进记录：{store.activities.length}</div>
              <div>费用记录：{store.expenses.length}</div>
              <div>竞品数量：{store.competitors.length}</div>
              <div>团队成员：{TEAM_MEMBERS.length}</div>
            </div>
          </div>
        </div>
      );
    }

    // ==================== 主应用 ====================
    function App() {
      const [page, setPage] = useState('pipeline');
      const store = useStore();

      const navItems = [
        { id: 'pipeline', name: '销售管道', icon: '📋' },
        { id: 'customers', name: '客户列表', icon: '👥' },
        { id: 'reports', name: '统计报表', icon: '📊' },
        { id: 'competitors', name: '竞品分析', icon: '⚔️' },
        { id: 'team', name: '团队管理', icon: '👨‍👩‍👦‍👦' },
        { id: 'settings', name: '设置', icon: '⚙️' },
      ];

      const activeCustomers = store.customers.filter(c => !['won','lost'].includes(c.status));
      const overdueCount = activeCustomers.filter(c => {
        const days = Math.floor((new Date() - new Date(c.lastFollowUp || c.updatedAt)) / 86400000);
        return days > 7;
      }).length;

      return (
        <div className="min-h-screen">
          <header className="bg-white dark:bg-gray-800 border-b dark:border-gray-700 shadow-sm sticky top-0 z-30">
            <div className="max-w-[1600px] mx-auto px-6 flex items-center justify-between h-14">
              <div className="flex items-center gap-8">
                <div className="flex items-center gap-2">
                  <div className="w-8 h-8 bg-gradient-to-br from-primary-600 to-primary-800 rounded-lg flex items-center justify-center text-white font-bold text-sm">S</div>
                  <span className="font-bold text-lg">SalesM</span>
                </div>
                <nav className="flex items-center gap-1">
                  {navItems.map(item => (
                    <button
                      key={item.id}
                      onClick={() => setPage(item.id)}
                      className={`px-3 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-1.5 ${
                        page === item.id
                          ? 'bg-primary-50 dark:bg-primary-900/30 text-primary-700 dark:text-primary-300'
                          : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700'
                      }`}
                    >
                      <span className="text-base">{item.icon}</span>
                      {item.name}
                    </button>
                  ))}
                </nav>
              </div>
              <div className="flex items-center gap-4">
                {overdueCount > 0 && (
                  <div className="flex items-center gap-1.5 text-sm text-red-500">
                    <span className="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                    {overdueCount} 待跟进
                  </div>
                )}
                <button
                  onClick={() => store.setDarkMode(!store.darkMode)}
                  className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                  title="切换深色模式"
                >
                  {store.darkMode ? '☀️' : '🌙'}
                </button>
                <div className="flex items-center gap-2 pl-3 border-l dark:border-gray-700">
                  <span className="text-lg">{store.currentUser.avatar}</span>
                  <span className="text-sm font-medium">{store.currentUser.name}</span>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-[1600px] mx-auto px-6 py-5">
            {page === 'pipeline' && <PipelinePage />}
            {page === 'customers' && <CustomersPage />}
            {page === 'reports' && <ReportsPage />}
            {page === 'competitors' && <CompetitorsPage />}
            {page === 'team' && <TeamPage />}
            {page === 'settings' && <SettingsPage />}
          </main>
        </div>
      );
    }

    // ==================== 渲染 ====================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <StoreProvider>
        <App />
      </StoreProvider>
    );
  </script>
</body>
</html>
